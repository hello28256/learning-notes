server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:33060/learning_notes?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# 文件上传配置
file:
  upload:
    dir: ./uploads
    allowed-extensions: .md,.txt,.markdown
    max-size: 52428800  # 50MB

# 日志配置
logging:
  level:
    com.learning.notes: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Markdown 配置
markdown:
  parser:
    options:
      # 启用的任务
      TASKS: "GITHUB_QUOTES,SMART_QUOTES,STRIKETHROUGH,TABLES,AUTOLINKS,LINKS,LISTS,HEADING,PARAGRAPH,INDENTED_CODE_BLOCK,FENCED_CODE_BLOCK,HTML_BLOCK,HTML_INLINE,IMAGE,EMPHASIS,STRONG,LIST_ITEM,LIST_MARKER,BLOCK_QUOTE,HR,SOFT_LINE_BREAK,EMOJI,DEFINITION_LINK"
      # 禁用的任务
      NO_TASKS: "EMOJI"