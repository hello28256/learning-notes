version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: learning-notes-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: learning_notes
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    networks:
      - learning-notes-network
      

  backend:
    image: crpi-zqmddwfip4cwc7n1.cn-beijing.personal.cr.aliyuncs.com/learning-notes/backend:latest
    container_name: learning-notes-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/learning_notes?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123456
      FILE_UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mysql
    networks:
      - learning-notes-network
    restart: unless-stopped

  frontend:
    image: crpi-zqmddwfip4cwc7n1.cn-beijing.personal.cr.aliyuncs.com/learning-notes/frontend:latest
    container_name: learning-notes-frontend
    ports:
      - "8089:80"
    depends_on:
      - backend
    networks:
      - learning-notes-network
    restart: unless-stopped

volumes:
  mysql_data:
  uploads_data:

networks:
  learning-notes-network:
    driver: bridge