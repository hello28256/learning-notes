<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yangq</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: #f5f7fa;
      }

      #app {
        min-height: 100vh;
      }

      /* Element Plus 主题覆盖 */
      :root {
        --el-color-primary: #667eea;
        --el-color-primary-light-3: #8492f5;
        --el-color-primary-light-5: #a0a8ff;
        --el-color-primary-light-7: #bcc2ff;
        --el-color-primary-light-8: #d0d4ff;
        --el-color-primary-light-9: #e4e7ff;
        --el-color-primary-dark-2: #5a67d8;
      }

      /* 滚动条样式 */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb {
        background: #c1c1c1;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #a8a8a8;
      }

      /* Markdown 样式 */
      .markdown-body {
        line-height: 1.8;
        color: #333;
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4,
      .markdown-body h5,
      .markdown-body h6 {
        margin-top: 24px;
        margin-bottom: 16px;
        font-weight: 600;
        line-height: 1.25;
      }

      .markdown-body h1 {
        font-size: 2em;
        border-bottom: 1px solid #eaecef;
        padding-bottom: 0.3em;
      }

      .markdown-body h2 {
        font-size: 1.5em;
        border-bottom: 1px solid #eaecef;
        padding-bottom: 0.3em;
      }

      .markdown-body p {
        margin-bottom: 16px;
      }

      .markdown-body code {
        background: rgba(27, 31, 35, 0.05);
        padding: 0.2em 0.4em;
        border-radius: 3px;
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      }

      .markdown-body pre {
        background: #f6f8fa;
        padding: 16px;
        border-radius: 6px;
        overflow: auto;
        margin-bottom: 16px;
      }

      .markdown-body pre code {
        background: none;
        padding: 0;
      }

      .markdown-body blockquote {
        border-left: 0.25em solid #dfe2e5;
        color: #6a737d;
        padding: 0 1em;
        margin-bottom: 16px;
      }

      .markdown-body ul,
      .markdown-body ol {
        margin-bottom: 16px;
        padding-left: 2em;
      }

      .markdown-body ul {
        list-style-type: disc;
      }

      .markdown-body ol {
        list-style-type: decimal;
      }

      .markdown-body li {
        margin-bottom: 4px;
      }

      .markdown-body table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 16px;
      }

      .markdown-body table th,
      .markdown-body table td {
        border: 1px solid #dfe2e5;
        padding: 6px 13px;
      }

      .markdown-body table th {
        background: #f6f8fa;
        font-weight: 600;
      }

      .markdown-body img {
        max-width: 100%;
        height: auto;
        border-radius: 6px;
      }

      .markdown-body a {
        color: #0366d6;
        text-decoration: none;
      }

      .markdown-body a:hover {
        text-decoration: underline;
      }

      .markdown-body hr {
        border: none;
        border-top: 1px solid #eaecef;
        margin: 24px 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
